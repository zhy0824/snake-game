<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Snake Game</title>

<style>
body {
  text-align: center;
  background: linear-gradient(135deg, #1e293b, #0f172a);
  color: white;
  font-family: Arial;
}

h1 {
  margin-top: 20px;
}

canvas {
  background: #111;
  margin-top: 20px;
  border-radius: 10px;
}

button {
  margin-top: 15px;
  padding: 10px 20px;
  font-size: 16px;
  border-radius: 8px;
  border: none;
  cursor: pointer;
}
</style>
</head>

<body>

<h1>🐍 贪吃蛇 Snake Game</h1>
<h2>得分: <span id="score">0</span></h2>

<canvas id="game" width="400" height="400"></canvas>

<br>
<button onclick="startGame()">开始 / 重开</button>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

const grid = 20;
let snake, direction, food, score, gameInterval, running;

function startGame() {
  snake = [{x:10,y:10}];
  direction = {x:1,y:0};
  food = randomFood();
  score = 0;
  running = true;
  document.getElementById("score").innerText = score;

  clearInterval(gameInterval);
  gameInterval = setInterval(update, 120);
}

function randomFood() {
  return {
    x: Math.floor(Math.random()*20),
    y: Math.floor(Math.random()*20)
  };
}

function drawRect(x,y,color) {
  ctx.fillStyle = color;
  ctx.fillRect(x*grid, y*grid, grid-2, grid-2);
}

function update() {
  const head = {
    x: snake[0].x + direction.x,
    y: snake[0].y + direction.y
  };

  // 撞墙
  if (head.x < 0 || head.x >= 20 || head.y < 0 || head.y >= 20) {
    gameOver();
    return;
  }

  // 撞自己
  for (let part of snake) {
    if (part.x === head.x && part.y === head.y) {
      gameOver();
      return;
    }
  }

  snake.unshift(head);

  // 吃食物
  if (head.x === food.x && head.y === food.y) {
    score++;
    document.getElementById("score").innerText = score;
    food = randomFood();
  } else {
    snake.pop();
  }

  draw();
}

function draw() {
  ctx.clearRect(0,0,400,400);

  // 食物（苹果样式）
  ctx.fillStyle = "red";
  ctx.beginPath();
  ctx.arc(food.x*grid+10, food.y*grid+10, 8, 0, Math.PI*2);
  ctx.fill();

  // 蛇
  snake.forEach((part, i) => {
    ctx.fillStyle = i === 0 ? "#22c55e" : "#4ade80";
    ctx.fillRect(part.x*grid, part.y*grid, grid-2, grid-2);
  });
}

function gameOver() {
  clearInterval(gameInterval);
  running = false;

  setTimeout(() => {
    alert("游戏结束！得分：" + score);
  }, 100);
}

document.addEventListener("keydown", e => {
  if (!running) return;

  if (e.key === "ArrowUp" && direction.y !== 1)
    direction = {x:0,y:-1};
  if (e.key === "ArrowDown" && direction.y !== -1)
    direction = {x:0,y:1};
  if (e.key === "ArrowLeft" && direction.x !== 1)
    direction = {x:-1,y:0};
  if (e.key === "ArrowRight" && direction.x !== -1)
    direction = {x:1,y:0};
});
</script>

</body>
</html>
