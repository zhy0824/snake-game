<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>贪吃蛇 Snake Game</title>
  <style>
    :root {
      --bg1: #221138;
      --bg2: #31185a;
      --bg3: #4a2484;
      --bg4: #6c3ac1;
      --text: #f8f2ff;
      --subtext: #decdfd;
      --panel: rgba(255,255,255,0.08);
      --panel-border: rgba(255,255,255,0.14);
      --btn-bg: #f7f0ff;
      --btn-text: #45206f;
      --board-bg: #16081f;
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      margin: 0;
      padding: 0;
      min-height: 100%;
      overflow: hidden;
      overscroll-behavior: none;
    }

    body {
      min-height: 100svh;
      font-family: Arial, "PingFang SC", "Microsoft YaHei", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 50% -10%, rgba(255,255,255,0.18), transparent 28%),
        radial-gradient(circle at 10% 10%, rgba(182, 120, 255, 0.22), transparent 24%),
        radial-gradient(circle at 90% 18%, rgba(255, 150, 230, 0.16), transparent 22%),
        linear-gradient(135deg, var(--bg1) 0%, var(--bg2) 35%, var(--bg3) 70%, var(--bg4) 100%);
      position: relative;
    }

    .bg-dot {
      position: fixed;
      border-radius: 50%;
      opacity: 0.35;
      pointer-events: none;
      filter: blur(1px);
    }

    .dot1 { width: 14px; height: 14px; background: #ff8cd9; top: 12%; left: 12%; }
    .dot2 { width: 10px; height: 10px; background: #ffd86b; top: 20%; right: 18%; }
    .dot3 { width: 18px; height: 18px; background: #9ef7ff; bottom: 18%; left: 14%; }
    .dot4 { width: 12px; height: 12px; background: #ffb0ef; bottom: 12%; right: 11%; }
    .dot5 { width: 8px; height: 8px; background: #fff; top: 32%; left: 50%; }
    .dot6 { width: 16px; height: 16px; background: #c8a8ff; top: 65%; right: 22%; }

    .kuromi {
      position: fixed;
      top: 50%;
      transform: translateY(-50%);
      width: clamp(88px, 12vw, 160px);
      opacity: 0.95;
      pointer-events: none;
      z-index: 1;
      filter: drop-shadow(0 12px 20px rgba(0,0,0,0.28));
    }

    .kuromi.left {
      left: 18px;
    }

    .kuromi.right {
      right: 18px;
      transform: translateY(-50%) scaleX(-1);
    }

    .page {
      min-height: 100svh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 22px 16px 30px;
      position: relative;
      z-index: 2;
    }

    .app {
      width: 100%;
      max-width: 760px;
      text-align: center;
    }

    .title {
      margin: 0;
      font-size: clamp(30px, 5vw, 56px);
      font-weight: 900;
      line-height: 1.15;
      letter-spacing: 0.4px;
      text-shadow: 0 10px 24px rgba(0,0,0,0.22);
    }

    .title .icon {
      display: inline-block;
      margin-right: 10px;
      transform: translateY(1px);
    }

    .score-wrap {
      margin-top: 16px;
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 10px 18px;
      background: var(--panel);
      border: 1px solid var(--panel-border);
      backdrop-filter: blur(10px);
      box-shadow: 0 10px 24px rgba(0,0,0,0.12);
    }

    .score-label {
      color: var(--subtext);
      font-size: 18px;
      font-weight: 700;
    }

    .score {
      min-width: 42px;
      text-align: center;
      font-size: 30px;
      font-weight: 900;
      color: white;
    }

    .board-shell {
      width: min(88vw, 520px);
      margin: 22px auto 0;
      position: relative;
    }

    canvas {
      display: block;
      width: 100%;
      aspect-ratio: 1 / 1;
      background: var(--board-bg);
      border: 2px solid rgba(255,255,255,0.1);
      border-radius: 0;
      box-shadow:
        0 18px 35px rgba(0,0,0,0.22),
        inset 0 0 0 1px rgba(255,255,255,0.03),
        inset 0 0 35px rgba(178, 91, 255, 0.08);
      touch-action: none;
    }

    .overlay {
      position: absolute;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      background: rgba(18, 8, 34, 0.58);
    }

    .overlay.show {
      display: flex;
    }

    .overlay-card {
      width: min(82%, 340px);
      padding: 24px 18px;
      background: rgba(35, 14, 62, 0.96);
      border: 1px solid rgba(255,255,255,0.12);
      box-shadow: 0 16px 36px rgba(0,0,0,0.25);
    }

    .overlay-title {
      margin: 0 0 10px;
      font-size: 30px;
      font-weight: 900;
    }

    .overlay-text {
      margin: 0 0 18px;
      font-size: 18px;
      color: #f0e6ff;
    }

    .controls {
      margin-top: 18px;
      display: flex;
      justify-content: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    button {
      appearance: none;
      border: none;
      outline: none;
      padding: 14px 24px;
      font-size: 20px;
      font-weight: 800;
      color: var(--btn-text);
      background: var(--btn-bg);
      cursor: pointer;
      box-shadow: 0 10px 22px rgba(0,0,0,0.18);
      transition: transform 0.12s ease, box-shadow 0.12s ease;
    }

    button:hover {
      transform: translateY(-1px);
      box-shadow: 0 14px 24px rgba(0,0,0,0.2);
    }

    button:active {
      transform: translateY(1px);
      box-shadow: 0 7px 14px rgba(0,0,0,0.18);
    }

    .mobile-pad {
      margin: 16px auto 0;
      width: 220px;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      user-select: none;
    }

    .mobile-pad .empty {
      visibility: hidden;
    }

    .dir-btn {
      width: 64px;
      height: 64px;
      padding: 0;
      font-size: 28px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 18px;
      background: linear-gradient(180deg, #fff7ff 0%, #eedfff 100%);
    }

    @media (max-width: 900px) {
      .kuromi {
        width: clamp(70px, 11vw, 110px);
        opacity: 0.8;
      }

      .kuromi.left { left: 8px; }
      .kuromi.right { right: 8px; }
    }

    @media (max-width: 640px) {
      .page {
        padding-top: 18px;
      }

      .score {
        font-size: 26px;
      }

      #startBtn {
        width: 180px;
        font-size: 18px;
        padding: 13px 18px;
      }

      .kuromi {
        top: 74px;
        transform: none;
        width: 68px;
        opacity: 0.75;
      }

      .kuromi.left {
        left: 10px;
      }

      .kuromi.right {
        right: 10px;
        transform: scaleX(-1);
      }
    }
  </style>
</head>

  <div class="page">
    <div class="app">
      <h1 class="title"><span class="icon">🐍</span>贪吃蛇大作战</h1>

      <div class="score-wrap">
        <span class="score-label">得分</span>
        <span class="score" id="score">0</span>
      </div>

      <div class="board-shell">
        <canvas id="game" width="600" height="600"></canvas>

        <div class="overlay" id="overlay">
          <div class="overlay-card">
            <h2 class="overlay-title">游戏结束</h2>
            <p class="overlay-text">本局得分：<span id="finalScore">0</span></p>
            <button id="restartOverlayBtn">重新开始</button>
          </div>
        </div>
      </div>

      <div class="controls">
        <button id="startBtn">开始 / 重开</button>
      </div>

      <div class="mobile-pad">
        <div class="empty"></div>
        <button class="dir-btn" id="upBtn">↑</button>
        <div class="empty"></div>

        <button class="dir-btn" id="leftBtn">←</button>
        <button class="dir-btn" id="downBtn">↓</button>
        <button class="dir-btn" id="rightBtn">→</button>
      </div>
    </div>
  </div>

  <script>
    const canvas = document.getElementById("game");
    const ctx = canvas.getContext("2d");

    const scoreEl = document.getElementById("score");
    const finalScoreEl = document.getElementById("finalScore");
    const overlay = document.getElementById("overlay");
    const startBtn = document.getElementById("startBtn");
    const restartOverlayBtn = document.getElementById("restartOverlayBtn");
    const upBtn = document.getElementById("upBtn");
    const downBtn = document.getElementById("downBtn");
    const leftBtn = document.getElementById("leftBtn");
    const rightBtn = document.getElementById("rightBtn");

    const GRID_COUNT = 20;
    const CELL = canvas.width / GRID_COUNT;

    let snake = [];
    let direction = { x: 1, y: 0 };
    let nextDirection = { x: 1, y: 0 };
    let apple = null;
    let score = 0;
    let gameTimer = null;
    let running = false;

    let audioCtx = null;

    function initAudio() {
      if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      }
    }

    function playEatSound() {
      if (!audioCtx) return;

      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();

      osc.type = "triangle";
      osc.frequency.setValueAtTime(720, audioCtx.currentTime);
      osc.frequency.exponentialRampToValueAtTime(980, audioCtx.currentTime + 0.08);

      gain.gain.setValueAtTime(0.0001, audioCtx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.18, audioCtx.currentTime + 0.01);
      gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 0.12);

      osc.connect(gain);
      gain.connect(audioCtx.destination);

      osc.start();
      osc.stop(audioCtx.currentTime + 0.12);
    }

    function resetGame() {
      snake = [
        { x: 7, y: 10 },
        { x: 6, y: 10 },
        { x: 5, y: 10 },
        { x: 4, y: 10 }
      ];

      direction = { x: 1, y: 0 };
      nextDirection = { x: 1, y: 0 };
      apple = getRandomApplePosition();
      score = 0;
      running = false;

      scoreEl.textContent = score;
      finalScoreEl.textContent = score;
      overlay.classList.remove("show");

      if (gameTimer) {
        clearInterval(gameTimer);
        gameTimer = null;
      }

      drawScene();
    }

    function startGame() {
      resetGame();
      running = true;
      overlay.classList.remove("show");
      gameTimer = setInterval(updateGame, 120);
    }

    function endGame() {
      running = false;
      clearInterval(gameTimer);
      gameTimer = null;
      finalScoreEl.textContent = score;
      overlay.classList.add("show");
    }

    function getRandomApplePosition() {
      while (true) {
        const p = {
          x: Math.floor(Math.random() * GRID_COUNT),
          y: Math.floor(Math.random() * GRID_COUNT)
        };

        const hitSnake = snake.some(seg => seg.x === p.x && seg.y === p.y);
        if (!hitSnake) return p;
      }
    }

    function setDirection(newDir) {
      if (!running) return;
      if (direction.x + newDir.x === 0 && direction.y + newDir.y === 0) return;
      nextDirection = newDir;
    }

    function updateGame() {
      direction = nextDirection;

      const newHead = {
        x: snake[0].x + direction.x,
        y: snake[0].y + direction.y
      };

      const hitWall =
        newHead.x < 0 ||
        newHead.x >= GRID_COUNT ||
        newHead.y < 0 ||
        newHead.y >= GRID_COUNT;

      if (hitWall) {
        endGame();
        return;
      }

      const ateApple = newHead.x === apple.x && newHead.y === apple.y;
      const bodyToCheck = ateApple ? snake : snake.slice(0, -1);

      const hitSelf = bodyToCheck.some(seg => seg.x === newHead.x && seg.y === newHead.y);
      if (hitSelf) {
        endGame();
        return;
      }

      snake.unshift(newHead);

      if (ateApple) {
        score += 1;
        scoreEl.textContent = score;
        playEatSound();
        apple = getRandomApplePosition();
      } else {
        snake.pop();
      }

      drawScene();
    }

    function drawScene() {
      drawBoard();
      drawApple(apple);
      drawSnake();
    }

    function drawBoard() {
      const bg = ctx.createLinearGradient(0, 0, canvas.width, canvas.height);
      bg.addColorStop(0, "#12061b");
      bg.addColorStop(0.55, "#1b0a27");
      bg.addColorStop(1, "#220c30");

      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = bg;
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      ctx.save();
      ctx.strokeStyle = "rgba(255,255,255,0.025)";
      ctx.lineWidth = 1;

      for (let i = 1; i < GRID_COUNT; i++) {
        const p = i * CELL;

        ctx.beginPath();
        ctx.moveTo(p, 0);
        ctx.lineTo(p, canvas.height);
        ctx.stroke();

        ctx.beginPath();
        ctx.moveTo(0, p);
        ctx.lineTo(canvas.width, p);
        ctx.stroke();
      }

      ctx.restore();
    }

    function drawApple(appleCell) {
      if (!appleCell) return;

      const cx = appleCell.x * CELL + CELL / 2;
      const cy = appleCell.y * CELL + CELL / 2;

      ctx.save();
      ctx.translate(cx, cy);

      const appleGrad = ctx.createRadialGradient(-5, -7, 2, 0, 0, 18);
      appleGrad.addColorStop(0, "#ffe0e0");
      appleGrad.addColorStop(0.32, "#ff7d7d");
      appleGrad.addColorStop(0.72, "#ef2c2c");
      appleGrad.addColorStop(1, "#a50000");

      ctx.fillStyle = appleGrad;

      ctx.beginPath();
      ctx.arc(0, 2, 13, 0, Math.PI * 2);
      ctx.fill();

      ctx.beginPath();
      ctx.arc(-7, 0, 8, 0, Math.PI * 2);
      ctx.arc(7, 0, 8, 0, Math.PI * 2);
      ctx.fill();

      ctx.strokeStyle = "#6b472f";
      ctx.lineWidth = 3;
      ctx.beginPath();
      ctx.moveTo(0, -10);
      ctx.lineTo(1, -18);
      ctx.stroke();

      ctx.fillStyle = "#59bf64";
      ctx.beginPath();
      ctx.ellipse(8, -14, 8, 5, -0.55, 0, Math.PI * 2);
      ctx.fill();

      ctx.fillStyle = "rgba(255,255,255,0.28)";
      ctx.beginPath();
      ctx.ellipse(-5, -3, 4.2, 6.2, -0.25, 0, Math.PI * 2);
      ctx.fill();

      ctx.restore();
    }

    function getCenter(seg) {
      return {
        x: seg.x * CELL + CELL / 2,
        y: seg.y * CELL + CELL / 2
      };
    }

    function drawSnake() {
      if (!snake.length) return;

      const points = snake.map(getCenter);

      ctx.save();

      ctx.lineCap = "round";
      ctx.lineJoin = "round";
      ctx.strokeStyle = "#56aefc";
      ctx.lineWidth = CELL * 0.56;

      ctx.beginPath();
      ctx.moveTo(points[0].x, points[0].y);
      for (let i = 1; i < points.length; i++) {
        ctx.lineTo(points[i].x, points[i].y);
      }
      ctx.stroke();

      for (let i = snake.length - 1; i >= 1; i--) {
        const p = points[i];
        const ratio = i / (snake.length - 1 || 1);
        const radius = CELL * (0.18 + (1 - ratio) * 0.12);

        const segGrad = ctx.createRadialGradient(
          p.x - radius * 0.45,
          p.y - radius * 0.55,
          radius * 0.15,
          p.x,
          p.y,
          radius
        );
        segGrad.addColorStop(0, "#bbedff");
        segGrad.addColorStop(0.45, "#64c7ff");
        segGrad.addColorStop(1, "#2a74f1");

        ctx.fillStyle = segGrad;
        ctx.beginPath();
        ctx.arc(p.x, p.y, radius, 0, Math.PI * 2);
        ctx.fill();

        ctx.strokeStyle = "rgba(255,255,255,0.08)";
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.arc(p.x, p.y, radius * 0.94, 0, Math.PI * 2);
        ctx.stroke();
      }

      drawSnakeTail();
      drawSnakeHead();
      ctx.restore();
    }

    function drawSnakeTail() {
      if (snake.length < 2) return;

      const tail = getCenter(snake[snake.length - 1]);
      const beforeTail = getCenter(snake[snake.length - 2]);
      const angle = Math.atan2(tail.y - beforeTail.y, tail.x - beforeTail.x);

      ctx.save();
      ctx.translate(tail.x, tail.y);
      ctx.rotate(angle);

      const tailGrad = ctx.createLinearGradient(-12, 0, 12, 0);
      tailGrad.addColorStop(0, "#9de8ff");
      tailGrad.addColorStop(1, "#2663e1");

      ctx.fillStyle = tailGrad;
      ctx.beginPath();
      ctx.moveTo(-7, -7);
      ctx.quadraticCurveTo(14, 0, -7, 7);
      ctx.closePath();
      ctx.fill();

      ctx.restore();
    }

    function drawSnakeHead() {
      const head = getCenter(snake[0]);

      let angle = 0;
      if (direction.x === 1) angle = 0;
      if (direction.x === -1) angle = Math.PI;
      if (direction.y === 1) angle = Math.PI / 2;
      if (direction.y === -1) angle = -Math.PI / 2;

      ctx.save();
      ctx.translate(head.x, head.y);
      ctx.rotate(angle);

      const headGrad = ctx.createRadialGradient(-6, -6, 2, 0, 0, 24);
      headGrad.addColorStop(0, "#d9f6ff");
      headGrad.addColorStop(0.42, "#7fd1ff");
      headGrad.addColorStop(1, "#2766e3");

      ctx.fillStyle = headGrad;
      ctx.beginPath();
      ctx.ellipse(0, 0, CELL * 0.5, CELL * 0.38, 0, 0, Math.PI * 2);
      ctx.fill();

      ctx.strokeStyle = "rgba(255,255,255,0.22)";
      ctx.lineWidth = 1.2;
      ctx.beginPath();
      ctx.ellipse(0, 0, CELL * 0.5, CELL * 0.38, 0, 0, Math.PI * 2);
      ctx.stroke();

      ctx.fillStyle = "#ffffff";
      ctx.beginPath();
      ctx.arc(6, -7, 4.6, 0, Math.PI * 2);
      ctx.arc(6, 7, 4.6, 0, Math.PI * 2);
      ctx.fill();

      ctx.fillStyle = "#111329";
      ctx.beginPath();
      ctx.arc(7.2, -7, 2.25, 0, Math.PI * 2);
      ctx.arc(7.2, 7, 2.25, 0, Math.PI * 2);
      ctx.fill();

      ctx.fillStyle = "rgba(255,255,255,0.45)";
      ctx.beginPath();
      ctx.arc(8.2, -8.2, 0.85, 0, Math.PI * 2);
      ctx.arc(8.2, 5.8, 0.85, 0, Math.PI * 2);
      ctx.fill();

      ctx.strokeStyle = "rgba(255,255,255,0.32)";
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      ctx.moveTo(9, 0);
      ctx.quadraticCurveTo(12, 0, 14, 0);
      ctx.stroke();

      ctx.restore();
    }

    function onDirectionKey(key) {
      if (key === "ArrowUp") setDirection({ x: 0, y: -1 });
      if (key === "ArrowDown") setDirection({ x: 0, y: 1 });
      if (key === "ArrowLeft") setDirection({ x: -1, y: 0 });
      if (key === "ArrowRight") setDirection({ x: 1, y: 0 });
    }

    document.addEventListener(
      "keydown",
      (e) => {
        if (["ArrowUp", "ArrowDown", "ArrowLeft", "ArrowRight", " "].includes(e.key)) {
          e.preventDefault();
        }
        onDirectionKey(e.key);
      },
      { passive: false }
    );

    upBtn.addEventListener("click", () => setDirection({ x: 0, y: -1 }));
    downBtn.addEventListener("click", () => setDirection({ x: 0, y: 1 }));
    leftBtn.addEventListener("click", () => setDirection({ x: -1, y: 0 }));
    rightBtn.addEventListener("click", () => setDirection({ x: 1, y: 0 }));

    startBtn.addEventListener("click", () => {
      initAudio();
      startGame();
    });

    restartOverlayBtn.addEventListener("click", () => {
      initAudio();
      startGame();
    });

    resetGame();
  </script>
</body>
</html>
