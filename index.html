<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>贪吃蛇 Snake Game</title>
  <style>
    :root {
      --bg1: #081223;
      --bg2: #0d1b37;
      --bg3: #132a57;
      --text: #eef4ff;
      --subtext: #a8bddf;
      --blue1: #7ec8ff;
      --blue2: #4aa3ff;
      --blue3: #2d7dff;
      --blue4: #1352d1;
      --panel: rgba(255,255,255,0.06);
      --panel-border: rgba(255,255,255,0.12);
      --button-bg: #eaf2ff;
      --button-text: #0f2347;
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      margin: 0;
      padding: 0;
      min-height: 100%;
    }

    body {
      min-height: 100svh;
      font-family: Arial, "PingFang SC", "Microsoft YaHei", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top, rgba(76, 135, 255, 0.18), transparent 34%),
        linear-gradient(90deg, var(--bg1) 0%, var(--bg2) 48%, #081a41 100%);
      overflow-x: hidden;
    }

    .page {
      min-height: 100svh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 28px 16px 48px;
    }

    .app {
      width: 100%;
      max-width: 760px;
      text-align: center;
    }

    .title {
      margin: 0;
      font-size: clamp(28px, 5vw, 56px);
      font-weight: 800;
      letter-spacing: 0.5px;
      line-height: 1.15;
      text-shadow: 0 6px 18px rgba(0,0,0,0.25);
    }

    .title .icon {
      display: inline-block;
      margin-right: 10px;
      transform: translateY(2px);
    }

    .score-wrap {
      margin-top: 18px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 10px 18px;
      background: var(--panel);
      border: 1px solid var(--panel-border);
      backdrop-filter: blur(10px);
    }

    .score-label {
      color: var(--subtext);
      font-size: 18px;
      font-weight: 600;
    }

    .score {
      font-size: 30px;
      font-weight: 800;
      color: white;
      min-width: 42px;
      text-align: center;
    }

    .board-shell {
      width: min(90vw, 520px);
      margin: 26px auto 0;
      position: relative;
      padding: 0;
      background: transparent;
    }

    canvas {
      display: block;
      width: 100%;
      aspect-ratio: 1 / 1;
      background: #02060d;
      border: 2px solid rgba(255,255,255,0.08);
      border-radius: 0;
      box-shadow:
        0 12px 30px rgba(0,0,0,0.35),
        inset 0 0 0 1px rgba(255,255,255,0.03);
      touch-action: none;
    }

    .overlay {
      position: absolute;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      background: rgba(3, 8, 18, 0.62);
    }

    .overlay.show {
      display: flex;
    }

    .overlay-card {
      width: min(82%, 320px);
      padding: 24px 18px;
      background: rgba(10, 20, 40, 0.92);
      border: 1px solid rgba(255,255,255,0.12);
      box-shadow: 0 18px 45px rgba(0,0,0,0.35);
    }

    .overlay-title {
      margin: 0 0 10px;
      font-size: 30px;
      font-weight: 800;
    }

    .overlay-text {
      margin: 0 0 18px;
      font-size: 18px;
      color: #dbe8ff;
    }

    .controls {
      margin-top: 18px;
      display: flex;
      justify-content: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    button {
      appearance: none;
      border: none;
      outline: none;
      padding: 14px 24px;
      font-size: 20px;
      font-weight: 700;
      color: var(--button-text);
      background: var(--button-bg);
      cursor: pointer;
      box-shadow: 0 8px 18px rgba(0,0,0,0.22);
      transition: transform 0.12s ease, box-shadow 0.12s ease, opacity 0.12s ease;
    }

    button:hover {
      transform: translateY(-1px);
      box-shadow: 0 12px 20px rgba(0,0,0,0.24);
    }

    button:active {
      transform: translateY(1px);
      box-shadow: 0 6px 12px rgba(0,0,0,0.22);
    }

    .mobile-pad {
      margin: 18px auto 0;
      width: 220px;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      user-select: none;
    }

    .mobile-pad .empty {
      visibility: hidden;
    }

    .dir-btn {
      width: 64px;
      height: 64px;
      padding: 0;
      font-size: 28px;
      font-weight: 800;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    @media (max-width: 640px) {
      .page {
        padding-top: 22px;
      }

      .score-wrap {
        margin-top: 16px;
      }

      .score {
        font-size: 26px;
      }

      #startBtn {
        width: 180px;
        font-size: 18px;
        padding: 13px 18px;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="app">
      <h1 class="title"><span class="icon">🐍</span>贪吃蛇 Snake Game</h1>

      <div class="score-wrap">
        <span class="score-label">得分</span>
        <span class="score" id="score">0</span>
      </div>

      <div class="board-shell">
        <canvas id="game" width="600" height="600"></canvas>

        <div class="overlay" id="overlay">
          <div class="overlay-card">
            <h2 class="overlay-title">游戏结束</h2>
            <p class="overlay-text">本局得分：<span id="finalScore">0</span></p>
            <button id="restartOverlayBtn">重新开始</button>
          </div>
        </div>
      </div>

      <div class="controls">
        <button id="startBtn">开始 / 重开</button>
      </div>

      <div class="mobile-pad">
        <div class="empty"></div>
        <button class="dir-btn" id="upBtn">↑</button>
        <div class="empty"></div>

        <button class="dir-btn" id="leftBtn">←</button>
        <button class="dir-btn" id="downBtn">↓</button>
        <button class="dir-btn" id="rightBtn">→</button>
      </div>
    </div>
  </div>

  <script>
    const canvas = document.getElementById("game");
    const ctx = canvas.getContext("2d");

    const scoreEl = document.getElementById("score");
    const finalScoreEl = document.getElementById("finalScore");
    const overlay = document.getElementById("overlay");
    const startBtn = document.getElementById("startBtn");
    const restartOverlayBtn = document.getElementById("restartOverlayBtn");

    const upBtn = document.getElementById("upBtn");
    const downBtn = document.getElementById("downBtn");
    const leftBtn = document.getElementById("leftBtn");
    const rightBtn = document.getElementById("rightBtn");

    const GRID_COUNT = 20;
    const CELL = canvas.width / GRID_COUNT;

    let snake = [];
    let direction = { x: 1, y: 0 };
    let nextDirection = { x: 1, y: 0 };
    let apple = null;
    let score = 0;
    let gameTimer = null;
    let running = false;
    let gameOver = false;

    function resetGame() {
      snake = [
        { x: 7, y: 10 },
        { x: 6, y: 10 },
        { x: 5, y: 10 },
        { x: 4, y: 10 }
      ];

      direction = { x: 1, y: 0 };
      nextDirection = { x: 1, y: 0 };
      apple = getRandomApplePosition();
      score = 0;
      running = false;
      gameOver = false;

      scoreEl.textContent = score;
      finalScoreEl.textContent = score;
      overlay.classList.remove("show");

      if (gameTimer) {
        clearInterval(gameTimer);
        gameTimer = null;
      }

      drawScene();
    }

    function startGame() {
      resetGame();
      running = true;
      gameOver = false;
      overlay.classList.remove("show");
      gameTimer = setInterval(updateGame, 120);
    }

    function endGame() {
      running = false;
      gameOver = true;
      clearInterval(gameTimer);
      gameTimer = null;
      finalScoreEl.textContent = score;
      overlay.classList.add("show");
    }

    function getRandomApplePosition() {
      while (true) {
        const p = {
          x: Math.floor(Math.random() * GRID_COUNT),
          y: Math.floor(Math.random() * GRID_COUNT)
        };

        const hitSnake = snake.some(seg => seg.x === p.x && seg.y === p.y);
        if (!hitSnake) return p;
      }
    }

    function setDirection(newDir) {
      if (!running) return;

      if (direction.x + newDir.x === 0 && direction.y + newDir.y === 0) {
        return;
      }

      nextDirection = newDir;
    }

    function updateGame() {
      direction = nextDirection;

      const newHead = {
        x: snake[0].x + direction.x,
        y: snake[0].y + direction.y
      };

      const hitWall =
        newHead.x < 0 ||
        newHead.x >= GRID_COUNT ||
        newHead.y < 0 ||
        newHead.y >= GRID_COUNT;

      if (hitWall) {
        endGame();
        return;
      }

      const ateApple = newHead.x === apple.x && newHead.y === apple.y;
      const bodyToCheck = ateApple ? snake : snake.slice(0, -1);

      const hitSelf = bodyToCheck.some(seg => seg.x === newHead.x && seg.y === newHead.y);
      if (hitSelf) {
        endGame();
        return;
      }

      snake.unshift(newHead);

      if (ateApple) {
        score += 1;
        scoreEl.textContent = score;
        apple = getRandomApplePosition();
      } else {
        snake.pop();
      }

      drawScene();
    }

    function drawScene() {
      drawBoard();
      drawApple(apple);
      drawSnake();
    }

    function drawBoard() {
      const boardGradient = ctx.createLinearGradient(0, 0, canvas.width, canvas.height);
      boardGradient.addColorStop(0, "#01040a");
      boardGradient.addColorStop(1, "#040a14");

      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = boardGradient;
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      ctx.save();
      ctx.strokeStyle = "rgba(255,255,255,0.02)";
      ctx.lineWidth = 1;

      for (let i = 1; i < GRID_COUNT; i++) {
        const p = i * CELL;
        ctx.beginPath();
        ctx.moveTo(p, 0);
        ctx.lineTo(p, canvas.height);
        ctx.stroke();

        ctx.beginPath();
        ctx.moveTo(0, p);
        ctx.lineTo(canvas.width, p);
        ctx.stroke();
      }
      ctx.restore();
    }

    function drawApple(appleCell) {
      if (!appleCell) return;

      const cx = appleCell.x * CELL + CELL / 2;
      const cy = appleCell.y * CELL + CELL / 2;

      ctx.save();
      ctx.translate(cx, cy);

      const appleGrad = ctx.createRadialGradient(-6, -8, 3, 0, 0, 18);
      appleGrad.addColorStop(0, "#ffd1d1");
      appleGrad.addColorStop(0.35, "#ff6b6b");
      appleGrad.addColorStop(0.7, "#ef2f2f");
      appleGrad.addColorStop(1, "#b30000");

      ctx.fillStyle = appleGrad;

      ctx.beginPath();
      ctx.arc(-6, 1, 10, 0, Math.PI * 2);
      ctx.arc(6, 1, 10, 0, Math.PI * 2);
      ctx.fill();

      ctx.beginPath();
      ctx.moveTo(-14, 5);
      ctx.quadraticCurveTo(0, 18, 14, 5);
      ctx.quadraticCurveTo(0, 16, -14, 5);
      ctx.fill();

      ctx.strokeStyle = "#6f4c2f";
      ctx.lineWidth = 3;
      ctx.beginPath();
      ctx.moveTo(0, -10);
      ctx.lineTo(1, -18);
      ctx.stroke();

      ctx.fillStyle = "#45b85b";
      ctx.beginPath();
      ctx.ellipse(8, -14, 8, 5, -0.5, 0, Math.PI * 2);
      ctx.fill();

      ctx.fillStyle = "rgba(255,255,255,0.28)";
      ctx.beginPath();
      ctx.ellipse(-6, -3, 4, 6.5, -0.25, 0, Math.PI * 2);
      ctx.fill();

      ctx.restore();
    }

    function getCenter(seg) {
      return {
        x: seg.x * CELL + CELL / 2,
        y: seg.y * CELL + CELL / 2
      };
    }

    function drawSnake() {
      if (!snake.length) return;

      const points = snake.map(getCenter);

      ctx.save();

      const bodyGradient = ctx.createLinearGradient(0, 0, canvas.width, canvas.height);
      bodyGradient.addColorStop(0, "#9fd9ff");
      bodyGradient.addColorStop(0.35, "#5ab2ff");
      bodyGradient.addColorStop(0.7, "#2e82ff");
      bodyGradient.addColorStop(1, "#184fd8");

      ctx.lineCap = "round";
      ctx.lineJoin = "round";
      ctx.strokeStyle = bodyGradient;
      ctx.lineWidth = CELL * 0.62;

      ctx.beginPath();
      ctx.moveTo(points[0].x, points[0].y);
      for (let i = 1; i < points.length; i++) {
        ctx.lineTo(points[i].x, points[i].y);
      }
      ctx.stroke();

      for (let i = snake.length - 1; i >= 1; i--) {
        const p = points[i];
        const t = i / (snake.length - 1 || 1);
        const radius = CELL * (0.16 + (1 - t) * 0.11);

        const segGrad = ctx.createRadialGradient(
          p.x - radius * 0.4,
          p.y - radius * 0.5,
          radius * 0.2,
          p.x,
          p.y,
          radius
        );
        segGrad.addColorStop(0, "#bce7ff");
        segGrad.addColorStop(0.45, "#63b9ff");
        segGrad.addColorStop(1, "#246ff2");

        ctx.fillStyle = segGrad;
        ctx.beginPath();
        ctx.arc(p.x, p.y, radius, 0, Math.PI * 2);
        ctx.fill();

        ctx.strokeStyle = "rgba(255,255,255,0.08)";
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.arc(p.x, p.y, radius * 0.94, 0, Math.PI * 2);
        ctx.stroke();
      }

      drawSnakeTail();
      drawSnakeHead();

      ctx.restore();
    }

    function drawSnakeTail() {
      if (snake.length < 2) return;

      const tail = getCenter(snake[snake.length - 1]);
      const beforeTail = getCenter(snake[snake.length - 2]);

      const angle = Math.atan2(tail.y - beforeTail.y, tail.x - beforeTail.x);

      ctx.save();
      ctx.translate(tail.x, tail.y);
      ctx.rotate(angle);

      const tailGrad = ctx.createLinearGradient(-12, 0, 12, 0);
      tailGrad.addColorStop(0, "#84d0ff");
      tailGrad.addColorStop(1, "#1758d8");

      ctx.fillStyle = tailGrad;
      ctx.beginPath();
      ctx.moveTo(-6, -6);
      ctx.quadraticCurveTo(12, 0, -6, 6);
      ctx.closePath();
      ctx.fill();

      ctx.restore();
    }

    function drawSnakeHead() {
      const head = getCenter(snake[0]);

      let angle = 0;
      if (direction.x === 1) angle = 0;
      if (direction.x === -1) angle = Math.PI;
      if (direction.y === 1) angle = Math.PI / 2;
      if (direction.y === -1) angle = -Math.PI / 2;

      ctx.save();
      ctx.translate(head.x, head.y);
      ctx.rotate(angle);

      const headGrad = ctx.createRadialGradient(-5, -5, 2, 0, 0, 20);
      headGrad.addColorStop(0, "#d2f0ff");
      headGrad.addColorStop(0.45, "#71c4ff");
      headGrad.addColorStop(1, "#185adf");

      ctx.fillStyle = headGrad;
      ctx.beginPath();
      ctx.ellipse(0, 0, CELL * 0.42, CELL * 0.34, 0, 0, Math.PI * 2);
      ctx.fill();

      ctx.strokeStyle = "rgba(255,255,255,0.18)";
      ctx.lineWidth = 1.2;
      ctx.beginPath();
      ctx.ellipse(0, 0, CELL * 0.42, CELL * 0.34, 0, 0, Math.PI * 2);
      ctx.stroke();

      ctx.fillStyle = "#ffffff";
      ctx.beginPath();
      ctx.arc(5, -5, 3.2, 0, Math.PI * 2);
      ctx.arc(5, 5, 3.2, 0, Math.PI * 2);
      ctx.fill();

      ctx.fillStyle = "#0f1832";
      ctx.beginPath();
      ctx.arc(6, -5, 1.6, 0, Math.PI * 2);
      ctx.arc(6, 5, 1.6, 0, Math.PI * 2);
      ctx.fill();

      ctx.fillStyle = "rgba(255,255,255,0.18)";
      ctx.beginPath();
      ctx.arc(10, 0, 1.2, 0, Math.PI * 2);
      ctx.fill();

      ctx.restore();
    }

    document.addEventListener("keydown", (e) => {
      if (e.key === "ArrowUp") setDirection({ x: 0, y: -1 });
      if (e.key === "ArrowDown") setDirection({ x: 0, y: 1 });
      if (e.key === "ArrowLeft") setDirection({ x: -1, y: 0 });
      if (e.key === "ArrowRight") setDirection({ x: 1, y: 0 });
    });

    upBtn.addEventListener("click", () => setDirection({ x: 0, y: -1 }));
    downBtn.addEventListener("click", () => setDirection({ x: 0, y: 1 }));
    leftBtn.addEventListener("click", () => setDirection({ x: -1, y: 0 }));
    rightBtn.addEventListener("click", () => setDirection({ x: 1, y: 0 }));

    startBtn.addEventListener("click", startGame);
    restartOverlayBtn.addEventListener("click", startGame);

    resetGame();
  </script>
</body>
</html>
